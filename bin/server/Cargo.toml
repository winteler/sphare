[package]
name = "server"
version = "0.1.0"
edition = "2024"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
sphare_core_common = { path = "../../lib/core/common", default-features = false, features = ["ssr"] }
sphare_core_user = { path = "../../lib/core/user", default-features = false, features = ["ssr"] }
sphare_core_content = { path = "../../lib/core/content", default-features = false, features = ["ssr"] }
sphare_cmp_utils = { path = "../../lib/components/utils", default-features = false, features = ["ssr"] }
sphare_app = { path = "../../lib/components/app", default-features = false, features = ["ssr"] }
leptos = { workspace = true, features = [ "ssr" ]}
leptos_meta = { workspace = true, features = [ "ssr" ] }
leptos_axum.workspace = true

axum.workspace = true
axum_session.workspace = true
axum_session_auth.workspace = true
axum_session_sqlx.workspace = true
log.workspace = true
simple_logger.workspace = true
sqlx.workspace = true
tokio.workspace = true
tower.workspace = true
tower-http.workspace = true

base64 = "0.22.1"
backoff = { version = "0.4.0", features = ["tokio"] }
tokio-cron-scheduler = "0.15.1"
tracing-subscriber = "0.3.22"
tracing = "0.1.44"
